name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests scripts

      - name: Unit tests
        run: pytest --ignore=tests/integration -q

      - name: Detect secrets
        run: |
          pip install detect-secrets
          detect-secrets scan --baseline .secrets.baseline

  build-paper-run:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Smoke — load every config
        run: |
          python -c "from src.config import BotConfig; \
            [BotConfig.from_yaml(p) for p in ['config/paper.yaml','config/live.yaml','config/backtest.yaml']]; \
            print('configs OK')"
      - name: Smoke — backtest on empty data
        run: python -m scripts.run_backtest --config config/backtest.yaml
