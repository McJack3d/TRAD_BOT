# Configuration for the Regime-Switching Long/Short Perp Daemon
mode: live
starting_equity_usdt: 1000

symbols:
  - spot: BTC/USDT
    perp: BTC/USDT:USDT
    min_qty: 0.0001
    tick_size: 0.01
    qty_step: 0.0001
  - spot: ETH/USDT
    perp: ETH/USDT:USDT
    min_qty: 0.001
    tick_size: 0.01
    qty_step: 0.001

strategy:
  timeframe: 15m
  adx_window: 14
  adx_trend_min: 25.0
  adx_range_max: 20.0
  rv_window: 20
  rv_lookback: 200
  rv_high_pctile: 0.60
  rv_low_pctile: 0.40
  ema_fast: 21
  ema_slow: 55
  bb_window: 20
  bb_std: 2.0
  rsi_window: 14
  rsi_os: 30.0
  rsi_ob: 70.0
  atr_window: 14
  atr_mult: 2.0
  risk_per_trade_pct: 0.01
  max_leverage: 3.0

risk:
  cooloff_bars: 6
  per_asset_daily_pct: 0.015
  max_consecutive_losses: 4
  daily_loss_stop_pct: 0.02
  cumulative_loss_stop_pct: 0.10

fees:
  perp_taker_bps: 4.0
  assumed_slippage_bps: 2.0
